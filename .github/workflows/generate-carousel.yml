name: Generate CAMO carousel

on:
  push:
    branches: [main]
    paths:
      - "ready_for_visual/**.md"
      - "!ready_for_visual/**-report.md"   # don't trigger on the report files we write

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (synthesise prompts, no generations)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write   # so the workflow can commit the report + CSVs back

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Run pipeline
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          python scripts/generate.py $DRY_FLAG

      - name: Commit results
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "camo-pipeline-bot"
          git config user.email "bot@camo.hku.hk"
          git add ready_for_visual/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Pipeline: generated report and CSVs [skip ci]"
            git push
          fi
