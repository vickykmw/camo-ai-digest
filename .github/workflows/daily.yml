name: Daily HBR Digest

on:
  schedule:
    # 00:00 UTC daily ≈ 7 pm CDT (summer) / 6 pm CST (winter).
    # GitHub Actions cron is always UTC and ignores DST.
    - cron: '0 0 * * *'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to commit the digest back to the repo

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's digest
        run: python digest.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/ seen.json README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily digest $(date -u +%Y-%m-%d)"
            git push
          fi
