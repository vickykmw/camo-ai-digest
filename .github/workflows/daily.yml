name: Daily HBR Digest

on:
  schedule:
    # 00:00 UTC daily ≈ 7 pm CDT (summer) / 6 pm CST (winter).
    # GitHub Actions cron is always UTC and ignores DST.
    - cron: '0 0 * * *'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: write  # needed to commit the digest back to the repo

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate today's digest
        run: python digest.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add digests/ seen.json README.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily digest $(date -u +%Y-%m-%d)"
          # Retry push with rebase if the remote has moved on between checkout and push.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push failed on attempt $attempt — pulling with rebase and retrying..."
            git pull --rebase origin main
          done
          echo "Push failed after 3 attempts." >&2
          exit 1
